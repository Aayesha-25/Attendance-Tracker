version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: attendance-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: attendance-app
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - EVENT_TZ_OFFSET_MINUTES=330
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-12h}
      - ADMIN_REGISTRATION_CODE=${ADMIN_REGISTRATION_CODE:?ADMIN_REGISTRATION_CODE must be set in .env}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./frontend:/app/frontend

volumes:
  redis_data:
    driver: local
